#####################################################################
# 舵机擦嘴 / 启动擦拭
#   - 舵机驱动可活动盖嘴 (擦拭刮片)
#   - WIPE_NOZZLE_START_V2: 打印开始前调用
#       1) 加热到目标温度
#       2) 在 PTFE 区域分批脉冲挤出废料
#       3) 移到刮片处反复擦拭
#####################################################################


#####################################################################
# 舵机硬件 (盖嘴 / 刮片)
#####################################################################
[servo nozzle]
pin: mcu:NOZZLE_SERVO
minimum_pulse_width: 0.00044
maximum_pulse_width: 0.0025
maximum_servo_angle: 180
initial_angle: 5                    # 上电默认角度 (盖嘴打开)


#####################################################################
# WIPE 参数容器 (供 WIPE_NOZZLE_START_V2 读取)
#####################################################################
[gcode_macro WIPE_CONFIG]
variable_ptfe_x: 230                # 挤出 (PTFE) 位置 X
variable_ptfe_y: 315                # 挤出 (PTFE) 位置 Y
variable_wipe_x: 239                # 擦拭起始 X
variable_wipe_x2: 253               # 擦拭终点 X
variable_wipe_y: 315                # 擦拭 Y
variable_servo_angle_default: 5     # 舵机收回角度 (盖嘴关闭)
variable_servo_angle_wipe: 90       # 舵机张开角度 (露出刮片)
variable_purge_length: 5            # 总挤出废料长度 (mm)
variable_purge_spd: 400             # 挤出速度 (mm/min)
variable_purge_pulse_mm: 5          # 每个脉冲挤出多少 mm
variable_purge_batch_size: 25       # 每批最多多少个脉冲
gcode:
    # 仅作变量容器


#####################################################################
# WIPE_NOZZLE_START_V2
#   - 打印起始时调用，参数 EXTRUDER_TEMP=<目标温度>
#   - 脉冲式挤出避免一次性挤太多导致结块
#   - 分批挤出后舵机张开，左右往复擦拭
#   - 收尾时降到 EXTRUDER_TEMP-50 再做一次精擦，减少拉丝
#   - KEEP_TEMP=1 时跳过收尾的两次降温，全程保持打印温度 (断料续打用)
#####################################################################
[gcode_macro WIPE_NOZZLE_START_V2]
description: 擦拭喷嘴用于精确 Z 限位，脉冲挤出废料 (可选 PURGE_LENGTH 覆盖默认长度)
gcode:
    {% set cfg = printer["gcode_macro WIPE_CONFIG"] %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(240)|float %}
    # 排废长度：默认取 WIPE_CONFIG.purge_length，传入 PURGE_LENGTH 则覆盖
    {% set PURGE_LENGTH = params.PURGE_LENGTH|default(cfg.purge_length)|float %}
    # KEEP_TEMP=1 时跳过收尾两次降温 (-50°C 与 150°C 保温)，全程保持打印温度，供断料续打使用
    {% set KEEP_TEMP = params.KEEP_TEMP|default(0)|int %}

    # 必须先 XY 归零
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 XY
    {% endif %}

    G90
    M83                                          # 相对挤出模式

    # 移到 PTFE 上方
    G1 X{cfg.ptfe_x} Y{cfg.ptfe_y - 50} F6000
    M400
    G1 X{cfg.ptfe_x} Y{cfg.ptfe_y} F6000

    # 等温到位
    M109 S{EXTRUDER_TEMP}

    # 计算脉冲数量并按 batch_size 分批
    {% set purge_len = PURGE_LENGTH %}
    {% set pulses_count = (purge_len / cfg.purge_pulse_mm)|round(0, 'ceil')|int %}
    {% set purge_per_pulse = purge_len / pulses_count %}
    {% set batch_size = cfg.purge_batch_size %}
    {% set full_batches = (pulses_count / batch_size)|int %}
    {% set remainder = pulses_count % batch_size %}
    {% set total_batches = full_batches + (1 if remainder > 0 else 0) %}

    {action_respond_info("WIPE_NOZZLE_START_V2: 脉冲挤出 %dmm 废料，共 %d 个脉冲" % (purge_len, pulses_count))}

    G92 E0

    # 主循环：每批挤出 + 擦拭
    {% for batch in range(total_batches) %}
        M400
        G1 X{cfg.ptfe_x} Y{cfg.ptfe_y} F6000

        # 最后一批可能不满一组
        {% set is_last = (batch == total_batches - 1) %}
        {% if is_last and remainder > 0 %}
            {% set pulses_this_batch = remainder %}
        {% else %}
            {% set pulses_this_batch = batch_size %}
        {% endif %}

        # 张开盖嘴 (露出刮片)
        SET_SERVO SERVO=nozzle ANGLE={cfg.servo_angle_wipe | int}
        G4 P500
        SET_SERVO SERVO=nozzle WIDTH=0

        # 脉冲挤出：先快后慢；每 5 个脉冲做一次回抽缓解压力
        {% for pulse in range(pulses_this_batch) %}
            G1 E{purge_per_pulse * 0.9} F{cfg.purge_spd}
            G1 E{purge_per_pulse * 0.1} F{cfg.purge_spd * 0.3}

            {% if pulse % 5 == 0 and pulse > 0 %}
                G1 E-1.5 F1800
                G4 P100
                G1 E1.8 F1200
            {% endif %}
        {% endfor %}

        # 模型风扇冷却废料 4 秒后再擦
        M106 S255
        G4 P4000
        G1 Y{cfg.wipe_y} F3000
        M400

        # 收回盖嘴
        SET_SERVO SERVO=nozzle ANGLE={cfg.servo_angle_default | int}
        G4 P500
        SET_SERVO SERVO=nozzle WIDTH=0

        # 三组往复擦拭，逐渐扩大行程
        {% for wipes in range(1, 3) %}
            G1 X{cfg.ptfe_x + 2} F15000
            G1 X{cfg.ptfe_x - 2} F15000
        {% endfor %}

        {% for wipes in range(1, 5) %}
            G1 X{cfg.wipe_x + 7} F5000
            G1 X{cfg.wipe_x - 7} F15000
        {% endfor %}
        G1 X{cfg.wipe_x + 6} F5000

        {% for wipes in range(1, 2) %}
            G1 X{cfg.wipe_x2 + 10} F1000
            G1 X{cfg.wipe_x - 10} F1000
        {% endfor %}
    {% endfor %}

    # 收尾：回抽 + 降温 + 精擦 (KEEP_TEMP=1 时跳过降温，在打印温度下精擦)
    G1 E-5 F1800
    {% if KEEP_TEMP == 0 %}
        M109 S{EXTRUDER_TEMP - 50}
    {% endif %}
    M400

    {% for wipes in range(1, 5) %}
        G1 X{cfg.wipe_x + 6} F5000
        G1 X{cfg.wipe_x - 6} F15000
    {% endfor %}
    G1 X{cfg.wipe_x + 6} F5000

    {% for wipes in range(1, 2) %}
        G1 X{cfg.wipe_x2 + 10} F1000
        G1 X{cfg.wipe_x - 10} F1000
    {% endfor %}

    G92 E0
    M107                                         # 关风扇
    {% if KEEP_TEMP == 0 %}
        M109 S150                                # 保温待用
    {% endif %}
    M400
