#####################################################################
# Multitool 机型实现层 (磁吸停靠坞 + X 横移开摆臂)
#
# 由 printer.cfg 通过 [include multitool/*.cfg] 自动加载。
# 本文件内容：
#   - [save_variables]                            持久化变量文件路径
#   - [multitool] / _offsets / _stats / _clamp  klipper-multitool 插件 section
#   - multitool_release_tool / pickup_tool      插件钩子 (薄壳，转发到机械动作宏)
#   - [_multitool_cfg]                          停靠坞坐标 / 速度 / 回抽参数
#   - _release_tool / _pickup_tool                机型相关的机械动作宏
#   - [gcode_macro M109]                          M109 重写：缺省 T 时补 current_tool
#####################################################################


#####################################################################
# 持久化变量
#####################################################################
[save_variables]
filename: ~/printer_data/config/myvariables.cfg


#####################################################################
# 多热端切换插件主配置
#   T0..T{n-1} / UNTOOL / CHANGE_TOOL / QUERY_TOOL_STATUS / 状态恢复
#####################################################################
[multitool]
tool_count: 4                   # T0..T3
z_hop: 0.4                      # 换头抬升
feed_z: 600                     # 抬升速度 (mm/min)
accel_swap: 8000          # 换头期间加速度
untool_safe_z: 10               # 上次无热端时第一动作要抬到的安全 Z

[multitool_offsets]
z_offset_adaptive: True         # 启用 Z 偏移自适应 (与基准热端的差值)

[multitool_stats]

#####################################################################
# 夹紧检测引脚
#   - 插件 multitool_clamp 子模块直接消费此输入
#   - PRESSED = 已夹紧；电平用 ! 反相
#####################################################################
[multitool_clamp]
pin: ^!toolhead:TOOL_CLAMP
settle_ms: 50

#####################################################################
# 耗材通道检查 (IO0~IO7)
#   由 multitool_filament 插件集中管理；
#   通道电平变化时在控制台输出装载 / 卸载提示。
#   电平用 ^ / ! / ~ 在各 pin 行控制，PRESSED = 已装载。
#####################################################################
[multitool_filament]
channel_count: 8
pin_0: ^multihotend:IO0
pin_1: ^multihotend:IO1
pin_2: ^multihotend:IO2
pin_3: ^multihotend:IO3
pin_4: ^multihotend:IO4
pin_5: ^multihotend:IO5
pin_6: ^multihotend:IO6
pin_7: ^multihotend:IO7

#####################################################################
# 插件钩子：薄壳，直接转发到下方机械动作宏
#   插件已做 TOOL 范围校验，并在钩子前后自动调用夹紧自检。
#####################################################################
[gcode_macro multitool_release_tool]
gcode:
    _release_tool TOOL={params.TOOL}

[gcode_macro multitool_pickup_tool]
gcode:
    _pickup_tool TOOL={params.TOOL}

#####################################################################
# 停靠坞参数集中管理 (仅机型相关项)
#   z_hop / feed_z / accel_swap 等框架参数已在上方 [multitool]。
#####################################################################
[gcode_macro _multitool_cfg]
description: 磁吸停靠坞参数

# --- 速度 / 加速度 ---
variable_feed_safe:        15000  # 移动到安全位置的速度 (mm/min)
variable_feed_fast:        1200   # 工作速度，空驶段 (mm/min)
variable_feed_slow:        400    # 工作速度，受力段 (磁吸/打开摆臂)

# --- 换热端回抽 / 清洗配置 ---
variable_swap_retract_len: 0      # 释放回抽：放回底座前抽多少 mm (0 关闭)
variable_swap_prime_len:   0      # 抓取补偿：抓取后挤出多少 mm (0 关闭)
variable_swap_retract_spd: 1000   # 回抽/补偿速度 (mm/min)

# --- 停靠坞运动逻辑参数 (相对每个 dock_x/y 的偏移) ---
variable_dock_shift_x: -3.5       # 横移开挤出机摆臂的 X 位移
variable_dock_dodge_y: 14         # 避让动作的 Y 轴相对位移
variable_dock_safe_y:  25         # 安全拔出的 Y 轴相对位移

# --- 各热端停靠坞坐标 (热端进入大孔时的 X/Y) ---
variable_t0_dock_x: 302.7
variable_t0_dock_y: -6
variable_t1_dock_x: 272.7
variable_t1_dock_y: -6
variable_t2_dock_x: 242.7
variable_t2_dock_y: -6
variable_t3_dock_x: 212.7
variable_t3_dock_y: -6

gcode:
    # 仅作变量容器


#####################################################################
# 释放热端 (将当前热端放回停靠坞)
#   动作序列 (与抓取严格相反):
#     1) X 对准大孔，Y 在停靠坞入口 (safe_y)
#     2) Y 前进，热端完全进入停靠坞
#     3) X 横移 shift_x，打开挤出机摆臂
#     4) Y 后退到 dodge_y，与磁吸分离
#     5) X 反向横移，闭合挤出机摆臂
#     6) Y 退回入口
#####################################################################
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _multitool_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set active_extruder = printer.toolhead.extruder %}

    # 当前热端的停靠坞核心点 + 相对位移
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    M118 正在放回 T{tool}

    # 释放回抽：温度足够才执行，避免冷挤出报错
    {% set cur_temp = printer[active_extruder].temperature|float %}
    {% set min_temp = printer.configfile.settings[active_extruder].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp and cfg.swap_retract_len|float > 0 %}
        M83
        G1 E-{cfg.swap_retract_len} F{cfg.swap_retract_spd}
    {% elif cfg.swap_retract_len|float > 0 %}
        M118 温度不足({cur_temp})，跳过释放回抽。
    {% endif %}

    # 释放动作 (抓取动作的逆序)
    G90
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_safe}            # 1. 入口
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}                     # 2. 进入坞
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}           # 3. 打开摆臂
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # 4. Y 退避，磁吸分离
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow}           # 5. 闭合摆臂
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}            # 6. 退回入口
    M400


#####################################################################
# 抓取热端 (从停靠坞抓起目标热端)
#   动作序列:
#     1) 到达停靠坞入口
#     2) Y 前进到避让位置 (摆臂可触撑杆，但打印头不撞热端)
#     3) X 横移打开挤出机摆臂
#     4) Y 前进，与热端磁吸结合
#     5) X 反向横移，闭合挤出机夹紧耗材
#     6) Y 退回入口
#####################################################################
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _multitool_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set current_heater = "extruder" if tool == 0 else ("extruder" ~ tool) %}

    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    M118 【抓取】正在抓取 T{tool}

    G90
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_safe}            # 1. 入口
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast}           # 2. 避让位置
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # 3. 打开摆臂
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}           # 4. 磁吸结合
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}                     # 5. 闭合摆臂

    # 抓取补偿：温度足够才执行
    {% set cur_temp = printer[current_heater].temperature|float %}
    {% set min_temp = printer.configfile.settings[current_heater].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp and cfg.swap_prime_len|float > 0 %}
        M83
        G1 E{cfg.swap_prime_len} F{cfg.swap_retract_spd}
    {% elif cfg.swap_prime_len|float > 0 %}
        M118 温度不足({cur_temp})，跳过抓取补偿。
    {% endif %}

    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}            # 6. 退回入口
    M400


#####################################################################
# M109 重写：温度收敛到 ±1.5°C，支持多热端
#   - 缺省 T 时作用于当前激活热端 (插件本身不重写 M109)
#   - 目标 ≤ 40°C 时不等待 (关机/降温场景)
#####################################################################
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target_temp = s if s > 0 else r %}
    {% set tool_index = params.T|default(-1)|int %}
    {% set sensor_name = printer.toolhead.extruder %}

    {% if tool_index == -1 %}
        {% set cur_tool = printer.multitool.current_tool|int %}
        {% set tool_index = cur_tool %}
        M118 未传递tool_index参数，加热当前热端：{cur_tool}
    {% endif %}

    {% if tool_index != -1 %}
        {% if tool_index == 0 %}
            {% set sensor_name = "extruder" %}
        {% else %}
            {% set sensor_name = "extruder" ~ tool_index %}
        {% endif %}
    {% endif %}

    {% if target_temp > 40 %}
        {% if tool_index != -1 %}
            M104 S{target_temp} T{tool_index}
        {% else %}
            M104 S{target_temp}
        {% endif %}
        TEMPERATURE_WAIT SENSOR={sensor_name} MINIMUM={target_temp - 1.5} MAXIMUM={target_temp + 1.5}
    {% endif %}
