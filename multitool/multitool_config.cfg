#####################################################################
# Multitool 机型实现层 (磁吸停靠坞 + X 横移开摆臂)
#
# 由 printer.cfg 通过 [include multitool/*.cfg] 自动加载。
# 本文件内容：
#   - [save_variables]                            持久化变量文件路径
#   - [multitool] / _offsets / _stats / _clamp  klipper-multitool 插件 section
#   - multitool_release_tool / pickup_tool      插件钩子 (薄壳，转发到机械动作宏)
#   - [_multitool_cfg]                          停靠坞坐标 / 速度 / 回抽参数
#   - _release_tool / _pickup_tool                机型相关的机械动作宏
#   - [gcode_macro M109]                          M109 重写：缺省 T 时补 current_tool
#####################################################################


#####################################################################
# 持久化变量
#####################################################################
[save_variables]
filename: ~/printer_data/config/myvariables.cfg


#####################################################################
# 多热端切换插件主配置
#   T0..T{n-1} / UNTOOL / CHANGE_TOOL / QUERY_TOOL_STATUS / 状态恢复
#####################################################################
[multitool]
tool_count: 4                   # T0..T3
z_hop: 0.4                      # 换头抬升
feed_z: 600                     # 抬升速度 (mm/min)
accel_swap: 8000                # 换头期间加速度
untool_safe_z: 10               # 上次无热端时第一动作要抬到的安全 Z

[multitool_offsets]
z_offset_adaptive: True         # 启用 Z 偏移自适应 (用于压力Z限位)

[multitool_stats]               # 启用耗时和次数统计

#####################################################################
# 插件钩子：薄壳，直接转发到下方机械动作宏
#   插件已做 TOOL 范围校验，并在钩子前后自动调用夹紧自检。
#####################################################################
[gcode_macro multitool_release_tool]
gcode:
    _release_tool TOOL={params.TOOL}

[gcode_macro multitool_pickup_tool]
gcode:
    _pickup_tool TOOL={params.TOOL}

#####################################################################
# 夹紧检测引脚
#   - 插件 multitool_clamp 子模块直接消费此输入
#   - PRESSED = 已夹紧；电平用 ! 反相
#####################################################################
[multitool_clamp]
pin: ^!toolhead:TOOL_CLAMP
settle_ms: 50

#####################################################################
# 耗材通道检查 (IO0~IO7) + 断料续打
#   由 multitool_filament 插件集中管理；
#   通道电平变化时在控制台输出装载 / 卸载提示。
#   电平用 ^ / ! / ~ 在各 pin 行控制，PRESSED = 已装载。
#   通道数复用 [multitool] tool_count，不再单独配 channel_count。
#
#   断料续打 (continuation_groups)：格式 [a,b,...],[c] —— 每个方括号是一个
#   有序续打组。打印中当前热端断料时，在同组内按顺序(环绕)找下一个有料热端，
#   自动 PAUSE → 换头 → RESUME 续打；同组无可用热端 / 不在任何组 → 直接暂停。
#####################################################################
[multitool_filament]
# T0 与 T1 互为续打对象；T2/T3 不配置 → 断料直接暂停打印
continuation_groups: [0,1]
runout_continue_length: 500
pin_0: ^multihotend:IO0
pin_1: ^multihotend:IO1
pin_2: ^multihotend:IO2
pin_3: ^multihotend:IO3
# pin_4: ^multihotend:IO4
# pin_5: ^multihotend:IO5
# pin_6: ^multihotend:IO6
# pin_7: ^multihotend:IO7


#####################################################################
# 断料续打钩子：换头后、RESUME 前
#   框架编排顺序：PAUSE → 设温新热端 → CHANGE_TOOL(等温) → 关旧热端
#                → multitool_filament_after_swap → RESUME
#   入参 FROM=<旧热端> TO=<新热端>。
#
#   这里调用现有 WIPE_NOZZLE_START_V2 在新热端排废擦嘴，确保续打前出料正常。
#   注意：WIPE_NOZZLE_START_V2 收尾会 M109 S150 降到保温温度，续打前必须
#         把新热端重新升回打印温度，否则 RESUME 会在 150°C 冷挤出。
#####################################################################
[gcode_macro multitool_filament_after_swap]
gcode:
    {% set to = params.TO|int %}
    {% set heater = "extruder" if to == 0 else "extruder" ~ to %}
    {% set tgt = printer[heater].target|float %}
    WIPE_NOZZLE_START_V2 EXTRUDER_TEMP={tgt} PURGE_LENGTH=100    # 续打多排废料确保出料
    M109 S{tgt}    # WIPE 收尾降到保温温度，续打前升回打印温度
