#####################################################################
# Multihotend 配置模板
#
# 此文件由 install.sh 在新安装模式下生成。
# 重要：请先替换所有 TODO_* 占位，再重启 Klipper。
#####################################################################

[mcu multihotend]
canbus_uuid: 7b421b74cfca       # multihotend CAN 板 ID

[board_pins multihotend]
mcu: multihotend
aliases:
    T7H=PB0,T7S=PA0,IO7=PA8,
    T6H=PB1,T6S=PA1,IO6=PA9,
    T5H=PB2,T5S=PA2,IO5=PA10,
    T4H=PB3,T4S=PA3,IO4=PA15,
    T3H=PB4,T3S=PA4,IO3=PB12,
    T2H=PB5,T2S=PA7,IO2=PB13,
    T1H=PB6,T1S=PA6,IO1=PB14,
    T0H=PB7,T0S=PA5,IO0=PB15,
    FAN1=PC15,FAN2=PC14

#####################################################################
# 风扇
#####################################################################
[heater_fan dock_fan]
pin: mcu:DOCK_FAN
max_power: 1.0
kick_start_time: 0.5
heater: extruder, extruder1, extruder2, extruder3, extruder4, extruder5, extruder6
heater_temp: 50
fan_speed: 0.9

[heater_fan hotend_fan]
pin: toolhead:HEATER_FAN
max_power: 1.0
kick_start_time: 0.5
heater: extruder, extruder1, extruder2, extruder3, extruder4, extruder5, extruder6
heater_temp: 50
fan_speed: 1.0

#####################################################################
# multihotend MCU 温度
#####################################################################
[temperature_sensor multihotend温度]
sensor_type: temperature_mcu
sensor_mcu: multihotend
min_temp: 0
max_temp: 100

#####################################################################
# 挤出机 / 热端
#####################################################################
#####################################################################
# 多热端模式：T0 使用物理挤出机，T1..Tn 仅做温度管理
#####################################################################
[extruder]
step_pin: toolhead:STEP
dir_pin: !toolhead:DIR
enable_pin: !toolhead:ENABLE
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 5.39
filament_diameter: 1.750
heater_pin: multihotend:T0H
nozzle_diameter: 0.400
smooth_time: 0.4
min_temp: 0
max_temp: 300
sensor_type: Generic 3950
sensor_pin: multihotend:T0S
max_power: 0.9
pressure_advance: 0.060
max_extrude_only_distance: 400
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: toolhead:UART
interpolate: False
run_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 0

[extruder1]
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: multihotend:T1H
sensor_type: Generic 3950
sensor_pin: multihotend:T1S
min_temp: 0
max_temp: 300
max_power: 0.9
min_extrude_temp: 170

[extruder2]
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: multihotend:T2H
sensor_type: Generic 3950
sensor_pin: multihotend:T2S
min_temp: 0
max_temp: 300
max_power: 0.9
min_extrude_temp: 170

[extruder3]
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: multihotend:T3H
sensor_type: Generic 3950
sensor_pin: multihotend:T3S
min_temp: 0
max_temp: 300
max_power: 0.9
min_extrude_temp: 170

[extruder4]
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: multihotend:T4H
sensor_type: Generic 3950
sensor_pin: multihotend:T4S
min_temp: 0
max_temp: 300
max_power: 0.9
min_extrude_temp: 170

[extruder5]
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: multihotend:T5H
sensor_type: Generic 3950
sensor_pin: multihotend:T5S
min_temp: 0
max_temp: 300
max_power: 0.9
min_extrude_temp: 170

[extruder6]
