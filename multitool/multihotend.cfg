#####################################################################
# Multihotend 配置模板
#
# 此文件由 install.sh 在新安装模式下生成。
# 重要：请先替换所有 TODO_* 占位，再重启 Klipper。
#####################################################################

# 多热端扩展板 MCU，名称固定为 multihotend
[mcu multihotend]
canbus_uuid: 7b421b74cfca                           # 【必改】扩展板 CAN UUID，可用 ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0 查询

# 为 multihotend MCU 定义引脚别名，便于后续引用
[board_pins multihotend]
mcu: multihotend
aliases:
    T7H=PB0,T7S=PA0,IO7=PA8,
    T6H=PB1,T6S=PA1,IO6=PA9,
    T5H=PB2,T5S=PA2,IO5=PA10,
    T4H=PB3,T4S=PA3,IO4=PA15,
    T3H=PB4,T3S=PA4,IO3=PB12,
    T2H=PB5,T2S=PA7,IO2=PB13,
    T1H=PB6,T1S=PA6,IO1=PB14,
    T0H=PB7,T0S=PA5,IO0=PB15,
    FAN1=PC15,FAN2=PC14

#####################################################################
# 风扇
#####################################################################
# 共享停靠坞风扇，监听所有热端温度
[heater_fan dock_fan]
pin: mcu:DOCK_FAN                                   # 【必改】共享 dock_fan 的风扇输出引脚
max_power: 1.0                                      # 风扇最大功率比例，1.0 表示 100%
kick_start_time: 0.5                                # 风扇启动助推时间，防止低速不转
heater: extruder, extruder1, extruder2, extruder3, extruder4, extruder5, extruder6                                  # 监听的热端列表，任一热端超过阈值都会启动
heater_temp: 50                                     # 热端超过 50°C 时启动风扇
fan_speed: 0.9                                      # 风扇运行速度，0.9 表示 90%

# 热端散热风扇，可共享监听所有热端
[heater_fan hotend_fan]
pin: toolhead:HEATER_FAN                            # 【必改】热端散热风扇输出引脚
max_power: 1.0                                      # 风扇最大功率比例，1.0 表示 100%
kick_start_time: 0.5                                # 风扇启动助推时间，防止低速不转
heater: extruder, extruder1, extruder2, extruder3, extruder4, extruder5, extruder6                                  # 监听的热端列表，任一热端超过阈值都会启动
heater_temp: 50                                     # 热端超过 50°C 时启动风扇
fan_speed: 1.0                                      # 热端散热风扇运行速度，1.0 表示 100%

#####################################################################
# multihotend MCU 温度
#####################################################################
# 显示 multihotend MCU 板载温度
[temperature_sensor multihotend温度]
sensor_type: temperature_mcu                        # 使用 Klipper 内置 MCU 温度传感器
sensor_mcu: multihotend                             # 读取 [mcu multihotend] 的 MCU 温度
min_temp: 0                                         # MCU 最低安全温度
max_temp: 100                                       # MCU 最高安全温度，超过会报错保护

#####################################################################
# 挤出机 / 热端
#####################################################################
#####################################################################
# 多热端模式：T0 使用物理挤出机，T1..Tn 仅做温度管理
#####################################################################
# T0 的 Klipper extruder section；T0 名称固定为 extruder
[extruder]
step_pin: toolhead:STEP        # 【必改】挤出机步进 STEP 引脚
dir_pin: !toolhead:DIR         # 【必改】挤出机步进 DIR 引脚；方向相反时在引脚前加/去掉 !
enable_pin: !toolhead:ENABLE   # 【必改】挤出机步进 ENABLE 引脚；常见为 ! 开头
microsteps: 32                                      # 挤出机细分；需与驱动配置一致
full_steps_per_rotation: 200                        # 电机每圈整步数；1.8 度电机通常为 200
rotation_distance: 5.39                       # 【必改】挤出机 rotation_distance，按实际挤出机构校准
filament_diameter: 1.750                            # 耗材直径；常见 1.75mm 耗材填 1.750
heater_pin: multihotend:T0H                   # 【必改】T0 加热棒 MOSFET 输出引脚
nozzle_diameter: 0.400                              # 喷嘴直径；需与实际喷嘴和切片器一致
smooth_time: 0.4                                    # 温度平滑时间；默认值通常可用
min_temp: 0                                         # 允许的最低温度；热敏异常低于此值会报错
max_temp: 300                                       # 允许的最高温度；按热端安全上限调整
sensor_type: Generic 3950                     # 【必改】热敏类型，例如 Generic 3950 / PT1000 等
sensor_pin: multihotend:T0S                   # 【必改】T0 热敏输入引脚
max_power: 0.9                                      # 加热最大功率比例；0.9 表示最高 90%
pressure_advance: 0.060                             # 压力提前；按耗材和挤出机校准，0 表示关闭
max_extrude_only_distance: 400                      # 允许纯挤出最大长度；换料/排料动作可能需要较大值
min_extrude_temp: 170                               # 低于该温度禁止挤出，防止冷挤出损坏挤出机

# T0 挤出机 TMC2209 驱动配置
[tmc2209 extruder]
uart_pin: toolhead:UART                       # 【必改】TMC UART 通讯引脚
interpolate: False                                  # 是否启用 256 细分插值；高速挤出通常建议关闭
run_current: 0.85                                   # 驱动运行电流，按电机额定电流和散热调整
sense_resistor: 0.110                               # 驱动采样电阻；按驱动模块实际值填写
stealthchop_threshold: 0                            # 0 表示挤出机使用 spreadCycle，通常更稳

# T1 仅温控热端；复用 T0 的物理挤出机步进
[extruder1]
nozzle_diameter: 0.400                              # 喷嘴直径；需与实际喷嘴和切片器一致
filament_diameter: 1.750                            # 耗材直径；常见 1.75mm 耗材填 1.750
heater_pin: multihotend:T1H                # 【必改】T1 加热棒 MOSFET 输出引脚
sensor_type: Generic 3950                       # 【必改】热敏类型，例如 Generic 3950 / PT1000 等
sensor_pin: multihotend:T1S                # 【必改】T1 热敏输入引脚
min_temp: 0                                         # 允许的最低温度；热敏异常低于此值会报错
max_temp: 300                                       # 允许的最高温度；按热端安全上限调整
max_power: 0.9                                      # 加热最大功率比例；0.9 表示最高 90%
min_extrude_temp: 170                               # 低于该温度禁止挤出；该热端无独立步进时仍用于温度安全判断

# T2 仅温控热端；复用 T0 的物理挤出机步进
