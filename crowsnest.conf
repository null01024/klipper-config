#####################################################################
# crowsnest 摄像头流配置
#   - mainsail-crew 的 webcam 流服务
#   - 文档: https://github.com/mainsail-crew/crowsnest
#
# 默认端口与 URL (Mainsail / Fluidd):
#   8080 -> /webcam/?action=[stream/snapshot]
#   8081 -> /webcam2/?action=[stream/snapshot]
#   8082 -> /webcam3/?action=[stream/snapshot]
#   8083 -> /webcam4/?action=[stream/snapshot]
# 直接访问 (绕过反代): http://<ip>:<port>/?action=[stream/snapshot]
# RTSP (如启用):       rtsp://<ip>:<rtsp_port>/stream.h264
#####################################################################


#####################################################################
# 全局设置
#####################################################################
[crowsnest]
log_path: /home/lu/printer_data/logs/crowsnest.log
log_level: verbose                      # quiet / verbose / debug
delete_log: false                       # true = 每次重启清空日志
no_proxy: false                         # true = 不需要反向代理 (慎用)


#####################################################################
# 摄像头 1 (主机仓内，USB)
#   mode: ustreamer    MJPG 流和快照 (WebRTC 需 camera-streamer)
#   实际分辨率/帧率由硬件能力决定，不支持的参数会被忽略
#####################################################################
[cam 1]
mode: ustreamer
port: 8080
device: /dev/v4l/by-id/usb-Alcor_Micro__Corp._USB2.0_WebCamera-video-index0
# device: /dev/v4l/by-id/usb-Generic_USB2.0_PC_CAMERA-video-index0   # 备用摄像头
resolution: 640x480
max_fps: 15
custom_flags:  --format=MJPEG --quality 50                          # ustreamer 自定义参数
v4l2ctl: --set-fmt-video=width=640,height=480,pixelformat=MJPG      # v4l2-ctl 设备参数
