#####################################################################
# Toolhead CAN 板 (小胖鞋36canmh)
#   - 挤出步进、X 限位、风扇、ADXL345、Eddy 探头、RGB
#   - 共振测试、Z 调平 (z_tilt)、网床 (bed_mesh) 在此定义
#####################################################################
[mcu toolhead]
canbus_uuid: 4253d01be6c1       # toolhead CAN 板 ID

[board_pins toolhead]
mcu: toolhead
aliases:
    BOX_SENSOR=PC5,
    TOOL_CLAMP=PD2,
    X_ENDSTOP=PA2,
    STEP=PA15, DIR=PC10, ENABLE=PC12, UART=PA14,
    HEATER_EXTRUDER=PB2, HEATER_FAN=PB3, HEATER_SENSOR=PB0,
    MODEL_FAN=PC2,
    HEAD_RGB=PA8,
    # ADXL345 软件 SPI
    ADXL_CS=PC6, ADXL_MOSI=PC9, ADXL_MISO=PC8, ADXL_SCK=PC7, ADXL_INT1=PC3,
    # Eddy Current 电感探头 (LDC1612 软件 I2C)
    EDDY_INTB=PC13, EDDY_SCL=PC1, EDDY_SDA=PC0


#####################################################################
# 工具头 RGB
#####################################################################
[neopixel my_neopixel]
pin: toolhead:HEAD_RGB
chain_count: 1
color_order: GRB


#####################################################################
# ADXL345 加速度计 + 共振测试
#####################################################################
[adxl345]
cs_pin: toolhead:ADXL_CS
spi_software_sclk_pin: toolhead:ADXL_SCK
spi_software_mosi_pin: toolhead:ADXL_MOSI
spi_software_miso_pin: toolhead:ADXL_MISO
axes_map: -y,-z,x

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 50
probe_points: 150, 150, 20


#####################################################################
# Eddy Current 电感探头 (LDC1612, I2C 软件总线)
#####################################################################
[probe_eddy_current eddy_probe]
sensor_type: ldc1612
i2c_address: 42
i2c_mcu: toolhead
frequency: 40000000
i2c_speed: 400000
intb_pin: toolhead:EDDY_INTB
i2c_software_scl_pin: toolhead:EDDY_SCL
i2c_software_sda_pin: toolhead:EDDY_SDA
x_offset: 0
y_offset: 14.1
z_offset: 2                     # 不可过低
speed: 5
samples: 3
sample_retract_dist: 5.0
samples_tolerance: 0.05
samples_tolerance_retries: 2

# [thermistor generic_10k_3950]
# temperature1: 25
# resistance1: 10000
# beta: 3950

# [temperature_probe eddy_probe]
# sensor_type:  generic_10k_3950
# sensor_pin: toolhead:PC4
# horizontal_move_z: 3

#####################################################################
# Z 三点调平
#####################################################################
[z_tilt]
z_positions:
    -50, 18
    150, 348
    350, 18
points:
    50, 30
    150, 230
    250, 30
speed: 100                      # 切换点位移动速度
horizontal_move_z: 4            # 切换点位时平台下移高度
retries: 5
retry_tolerance: 0.01

[bed_mesh]
speed: 200                      # 探测点之间的移动速度
horizontal_move_z: 2
mesh_min: 50, 50
mesh_max: 250, 250
zero_reference_position: 150, 150
probe_count: 15, 15             # 必须为单数，使中心点位于热床中心
algorithm: bicubic


#####################################################################
# Eddy 快速扫床 / 快速 Z 调平 (覆盖默认实现)
#####################################################################
[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
    {% set PROBE_Z_OFFSET = printer.configfile.settings['probe_eddy_current eddy_probe'].z_offset|float %}
    _BED_MESH_CALIBRATE horizontal_move_z={PROBE_Z_OFFSET} METHOD=rapid_scan {rawparams}

[gcode_macro Z_TILT_ADJUST]
description: eddy 快速 Z 调平 (三点)
rename_existing: _Z_TILT_ADJUST
gcode:
    {% set PROBE_Z_OFFSET = printer.configfile.settings['probe_eddy_current eddy_probe'].z_offset|float %}
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    BED_MESH_CLEAR
    # 第一次调平前先粗调，使三点之差减小，避免撞床
    {% if not printer.z_tilt.applied %}
        _Z_TILT_ADJUST horizontal_move_z=8 retry_tolerance=1 SAMPLES=1
    {% endif %}
    # 精细调平
    _Z_TILT_ADJUST horizontal_move_z={PROBE_Z_OFFSET} retry_tolerance=0.005 retries=20 METHOD=rapid_scan ADAPTIVE=1
    G90
    G0 Z5 F300
    M117 Z_tilt Completed
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT
    M400
