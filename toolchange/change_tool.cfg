#####################################################################
# Toolchanger 换热端核心宏
#   - 4 个热端 (T0~T3) + 一个无热端状态 (-1)
#   - 机械式磁吸停靠坞，通过 X 横移摆臂打开/合上
#   - 多热端共用同一物理挤出步进电机 (E-step from toolhead 板)
#
# 模块组织:
#   1. save_variables                - 持久化变量管理
#   2. delayed_gcode                  - 启动时恢复 / 显示统计
#   3. _toolchanger_cfg               - 集中参数 (停靠坞坐标、速度等)
#   4. T0/T1/T2/T3/UNTOOL             - 用户级触发宏
#   5. SET_BASE_TOOL/RESET_*/SHOW_*   - 辅助宏
#   6. _tool_status                   - 当前状态 + 计时变量
#   7. _release_tool / _pickup_tool   - 释放 / 抓取动作序列
#   8. change_tool                    - 主切换流程 (含偏移自适应)
#   9. M109 重写                      - 多热端温度等待
#####################################################################


#####################################################################
# 持久化变量
#   - 保存当前 tool / 偏移量 / 累计统计
#   - 文件位置：myvariables.cfg
#####################################################################
[save_variables]
filename: ~/printer_data/config/myvariables.cfg


#####################################################################
# 启动时恢复 current_tool（防止断电后状态丢失）
#####################################################################
[delayed_gcode RESTORE_TOOL_STATUS]
initial_duration: 0.1
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.current_tool is defined %}
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={svv.current_tool}
        # 如有需要可在此补充：恢复温度、Z 抬升等
    {% endif %}


#####################################################################
# 1. 参数集中管理
#   修改坐标 / 速度 / 行程时只需改这里
#####################################################################
[gcode_macro _toolchanger_cfg]
description: 换热端参数配置

# --- 换热端抬升与速度 / 加速度 ---
variable_z_hop:            0.4    # 换热端抬升高度 (mm)
variable_feed_z:           600    # 抬升速度 (mm/min)
variable_feed_safe:        15000  # 移动到安全位置的速度
variable_feed_fast:        1200   # 工作速度（空驶）
#variable_feed_fast:       2000   # 测试用更快速度
variable_feed_slow:        400    # 工作速度（受力，磁吸/打开摆臂）
variable_accel_toolchange: 8000   # 换热端时的加速度 (覆盖 max_accel)

# --- 换热端回抽 / 清洗配置 ---
variable_swap_retract_len: 0      # [A] 释放回抽：放回底座时抽多少
variable_swap_prime_len:   0      # [B] 抓取清洗：抓取时挤出多少
variable_swap_retract_spd: 1000

# --- 停靠坞运动逻辑参数 (相对每个 dock_x/y 的偏移) ---
variable_dock_shift_x: -3.5       # 横移开挤出机距离 (打开摆臂)
variable_dock_dodge_y: 14         # 避让动作的 Y 轴相对位移
variable_dock_safe_y:  25         # 安全拔出的 Y 轴相对位移

# --- Z 偏移自适应，用于接触式Z限位机器 ---
#   0 = 关闭 (直接用每个热端的绝对 z_offset)
#   1 = 开启 (与基准热端的 z_offset 差值)
variable_z_offset_adaptive: 1

# --- 各热端停靠坞坐标 (热端进入大孔时的 X/Y) ---
# T0
variable_t0_dock_x: 302.7
variable_t0_dock_y: -6
# T1
variable_t1_dock_x: 272.7
variable_t1_dock_y: -6
# T2
variable_t2_dock_x: 242.7
variable_t2_dock_y: -6
# T3
variable_t3_dock_x: 212.7
variable_t3_dock_y: -6

gcode:
    # 仅作变量容器


#####################################################################
# 2. 用户级换热端触发宏
#   T0~T3 - 切换到对应热端 (空闲 → 抓取 / 已有热端 → 卸载再抓取)
#   UNTOOL - 卸下当前热端，回到空闲状态 (T = -1)
#####################################################################
[gcode_macro T0]
gcode: change_tool T=0

[gcode_macro T1]
gcode: change_tool T=1

[gcode_macro T2]
gcode: change_tool T=2

[gcode_macro T3]
gcode: change_tool T=3

[gcode_macro UNTOOL]
gcode: change_tool T=-1


#####################################################################
# 设置 Z 偏移自适应基准热端
#   - 通常在 PRINT_START 中调用 SET_BASE_TOOL T={INITIAL_TOOL}
#   - 之后所有热端的 Z 偏移都按 (z[T] - z[base]) 计算
#####################################################################
[gcode_macro SET_BASE_TOOL]
description: 设置 Z 偏移计算的基准热端，通常在开始打印前调用
gcode:
    {% set tool = params.T|default(-1)|int %}
    SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=base_tool VALUE={tool}
    M118 基准热端已设置为 T{tool}


#####################################################################
# 3. 状态变量 (仅保留热端号 / 基准热端)
#   - current_tool : 当前抓取的热端号 (-1 = 无热端)
#   - base_tool    : Z 偏移自适应基准
#   注意: 换热端计时统计完全由 [toolchange_stats] 在内存 + save_variables 中维护，
#         不再在此宏暴露 *_start / *_elapsed / total_* 等变量。
#####################################################################
[gcode_macro _tool_status]
variable_current_tool: -1
variable_base_tool: -1
gcode:


#####################################################################
# 工具头夹紧检测微动开关
#   - 引脚定义在 toolhead.cfg 的 board_pins 别名 TOOL_CLAMP=PD2
#   - 摆臂闭合且热端到位 → 开关闭合 → state = "PRESSED"
#   - 摆臂打开 / 未夹住    → 开关断开 → state = "RELEASED"
#   - 由换热端宏 _assert_clamp 主动轮询，press/release_gcode 留空
#####################################################################
[gcode_button tool_clamp]
pin: ^!toolhead:TOOL_CLAMP

# --- 夹紧微动开关检测 (toolhead:TOOL_CLAMP / [gcode_button tool_clamp]) ---
variable_clamp_check_enable: 1    # 0=完全关闭检测；调试时可临时关
variable_clamp_settle_ms:    50   # 校验前 dwell (ms)，去抖


#####################################################################
# 查询当前夹紧状态 + 当前热端编号
#   - 不做任何动作判定，仅读取微动开关 + _tool_status
#   - 适合手动在控制台输入排查使用
#####################################################################
[gcode_macro QUERY_TOOL_STATUS]
description: 查询当前夹紧状态和热端编号
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    M400
    G4 P{cfg.clamp_settle_ms}

    {% set raw = printer["gcode_button tool_clamp"].state|string %}
    {% set clamp_cn = "已夹紧" if raw == "PRESSED" else "已释放" %}

    {% set cur = printer["gcode_macro _tool_status"].current_tool|int %}
    {% set base = printer["gcode_macro _tool_status"].base_tool|int %}
    {% set tool_cn = "无热端" if cur == -1 else ("T%d" % cur) %}
    {% set base_cn = "未设置" if base == -1 else ("T%d" % base) %}

    {% set svv = printer.save_variables.variables %}
    {% set disk = svv.current_tool|default(-1)|int %}
    {% set disk_cn = "无热端" if disk == -1 else ("T%d" % disk) %}

    M118 ====== 当前换热端状态 ======
    M118 夹紧开关: {clamp_cn} (raw={raw})
    M118 当前热端: {tool_cn}  (内存 current_tool={cur})
    M118 持久化值: {disk_cn}  (myvariables.cfg)
    M118 基准热端: {base_cn}
    {% if (raw == "PRESSED" and cur == -1) or (raw == "RELEASED" and cur != -1) %}
        M118 ⚠ 警告: 物理状态与记录不一致！
    {% endif %}


#####################################################################
# 夹紧微动开关自检
#   参数:
#     STATE  = clamped | released   期望状态
#     REASON = <字符串>             失败时打印的原因
#     ACTION = cancel | pause       失败时的处置 (默认 pause)
#
#   语义:
#     PRESSED  = 摆臂已闭合并夹住热端
#     RELEASED = 摆臂打开 / 未夹住
#####################################################################
[gcode_macro _assert_clamp]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% if cfg.clamp_check_enable|int == 1 %}
        {% set expect = params.STATE|default("clamped")|string %}
        {% set reason = params.REASON|default("clamp check")|string %}

        # 排空运动队列 + 去抖 dwell，确保读到稳态
        M400
        G4 P{cfg.clamp_settle_ms}

        {% set raw = printer["gcode_button tool_clamp"].state|string %}
        {% set actual = "clamped" if raw == "PRESSED" else "released" %}
        {% set ok = (actual == expect) %}
        {% set expect_cn = "已夹紧" if expect == "clamped" else "已释放" %}
        {% set actual_cn = "已夹紧" if actual == "clamped" else "已释放" %}

        {% if ok %}
            M118 [夹紧自检] 通过 (原因={reason}) 期望={expect_cn} 实际={actual_cn}
        {% else %}
            {% set cur = printer["gcode_macro _tool_status"].current_tool|int %}
            M118 [夹紧自检] 失败 (原因={reason}) 期望={expect_cn} 实际={actual_cn} 当前热端=T{cur}
            M117 夹紧自检失败: {reason}
            # 取消当前打印任务并立即抛异常中止后续 G-code 解析，
            # 防止宏继续执行（撞坞 / 错误落盘 current_tool）。
            # 取消打印不会进 shutdown，无需 FIRMWARE_RESTART，排查后可直接重试。
            CANCEL_PRINT
            {action_raise_error("夹紧自检失败 (原因=%s) 期望=%s 实际=%s 当前热端=T%d" % (reason, expect_cn, actual_cn, cur))}
        {% endif %}
    {% endif %}


#####################################################################
# 4. 释放热端 (将当前热端放回停靠坞)
#   动作序列 (与抓取动作严格相反):
#     1) X 对准大孔，Y 在停靠坞入口 (safe_y)
#     2) Y 前进，热端完全进入停靠坞
#     3) X 横移 shift_x，打开挤出机摆臂
#     4) Y 后退到 dodge_y，与磁吸分离
#     5) X 反向横移，闭合挤出机摆臂
#     6) Y 退回入口
#####################################################################
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set active_extruder = printer.toolhead.extruder %}

    # 当前热端的停靠坞核心点 + 相对位移
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    {% set msg = "正在放回 T%d" % tool %}   M118 {msg}

    # 释放前校验：头上必须确实夹着热端，否则后续动作会撞坞
    _assert_clamp STATE=clamped REASON=释放前校验_T{tool}

    # --- [A] 释放回抽，防止底座溢料 (温度足够时才执行) ---
    {% set cur_temp = printer[active_extruder].temperature|float %}
    {% set min_temp = printer.configfile.settings[active_extruder].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
        M83
        G1 E-{cfg.swap_retract_len} F{cfg.swap_retract_spd}
    {% else %}
        M118 温度不足({cur_temp})，跳过释放回抽。
    {% endif %}

    # --- 释放动作 (抓取的逆序) ---
    G90
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_safe}            # 1. 入口
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}                     # 2. 进入坞
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}           # 3. 打开摆臂
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # 4. Y 退避，磁吸分离
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow}           # 5. 闭合摆臂

    # 5.5 释放后校验：摆臂应已张开、未夹住热端
    _assert_clamp STATE=released REASON=释放后校验_T{tool}

    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}            # 6. 退回入口
    M400


#####################################################################
# 5. 抓取热端 (从停靠坞抓起目标热端)
#   动作序列:
#     1) 到达停靠坞入口
#     2) Y 前进到避让位置 (摆臂可触撑杆，但打印头不撞热端)
#     3) X 横移打开挤出机摆臂
#     4) Y 前进，与热端磁吸结合
#     5) X 反向横移，闭合挤出机夹紧耗材
#     6) Y 退回入口
#####################################################################
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set current_heater = "extruder" if tool == 0 else ("extruder" ~ tool) %}

    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    {% set msg = "【抓取】正在抓取 T%d" % tool %}   M118 {msg}

    # 抓取前校验：摆臂必须空载，否则会撞已挂着的热端
    _assert_clamp STATE=released REASON=抓取前校验_T{tool}

    G90
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_safe}            # 1. 入口
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast}           # 2. 避让位置
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow} # 3. 打开摆臂
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}           # 4. 磁吸结合
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}                     # 5. 闭合摆臂

    # 5.5 抓取后校验：摆臂应已闭合并夹住热端，否则离开坞会掉热端
    _assert_clamp STATE=clamped REASON=抓取后校验_T{tool}

    # --- 停靠坞内挤出补偿 (温度足够时才执行) ---
    {% set cur_temp = printer[current_heater].temperature|float %}
    {% set min_temp = printer.configfile.settings[current_heater].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
        M83
        G1 E{cfg.swap_prime_len} F{cfg.swap_retract_spd}
    {% else %}
        M118 温度不足({cur_temp})，跳过抓取会抽处理。
    {% endif %}

    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}            # 6. 退回入口
    M400


#####################################################################
# 6. 主切换宏 change_tool T=<n>
#   - 同号 T 直接跳过
#   - 抬升 → 释放旧热端 → 抓取新热端 → 等温到位 → 应用偏移
#   - 全程使用 _toolchanger_cfg.accel_toolchange 加速度，结束恢复
#####################################################################
[gcode_macro change_tool]
gcode:
    {% set new_tool = params.T|default(-1)|int %}
    {% set old_tool = printer["gcode_macro _tool_status"].current_tool|int %}
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}

    {% if new_tool == old_tool %}
        M118 目标状态与当前一致(T{new_tool})，无需操作。
    {% else %}
        {% if new_tool == -1 %}
            M118 收到卸载指令：正在卸载 T{old_tool} ...
        {% else %}
            M118 切换工具: T{old_tool} -> T{new_tool}
        {% endif %}

        # 入口自检：确保持久化的 current_tool 与微动开关读数一致
        #   old_tool != -1 ⇒ 应当 clamped (头上确实夹着热端)
        #   old_tool == -1 ⇒ 应当 released (摆臂空载)
        {% if old_tool != -1 %}
            _assert_clamp STATE=clamped REASON=入口校验_有热端_T{old_tool}
        {% else %}
            _assert_clamp STATE=released REASON=入口校验_无热端
        {% endif %}

        # 保存换热端前的位置 / 模式
        SAVE_GCODE_STATE NAME=tool_change

        # 切到换热端加速度，记录原始值用于恢复
        {% set saved_accel = printer.toolhead.max_accel %}
        SET_VELOCITY_LIMIT ACCEL={cfg.accel_toolchange}

        # 抬升避免刮床
        G91
        G0 Z{cfg.z_hop} F{cfg.feed_z}
        G90

        # 记录换热端开始时间 (toolchange_stats)
        TOOLCHANGE_TIMER_BEGIN

        {% if old_tool == -1 %}
            # 上一次状态无热端，说明当前 Z 还很低，先抬到 10mm 安全
            G0 Z10 F{cfg.feed_z}
        {% endif %}

        # 抓/放过程中先清空偏移，统一停靠坞坐标系
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        M118 T{new_tool} 抓取/释放热端，清除校准值: X=0 Y=0 Z=0

        # 释放旧热端
        {% if old_tool != -1 %}
            TOOLCHANGE_STAGE_BEGIN STAGE=release
            _release_tool TOOL={old_tool}
            TOOLCHANGE_STAGE_END STAGE=release
            # 释放成功后立即落盘：此时头上确实无热端，
            # 即使后续抓取失败，状态也能正确停留在 -1
            SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE=-1
            SAVE_VARIABLE VARIABLE=current_tool VALUE=-1
        {% else %}
            M118 当前无热端，跳过释放。
        {% endif %}

        # 抓取新热端 + 等温到位
        {% if new_tool != -1 %}
            TOOLCHANGE_STAGE_BEGIN STAGE=pickup
            _pickup_tool  TOOL={new_tool}
            TOOLCHANGE_STAGE_END STAGE=pickup
            # 抓取成功后立即落盘：此时已通过夹紧自检，
            # 物理状态与持久化值一致
            SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={new_tool}
            SAVE_VARIABLE VARIABLE=current_tool VALUE={new_tool}

            {% set next_heater = "extruder" if new_tool == 0 else ("extruder" ~ new_tool) %}
            {% set target_temp = printer[next_heater].target|float %}
            {% if target_temp > 0 %}
                {% if printer[next_heater].temperature < (target_temp - 2) %}
                    TOOLCHANGE_STAGE_BEGIN STAGE=heat_wait
                    M118 T{new_tool} 预热中...
                    TEMPERATURE_WAIT SENSOR={next_heater} MINIMUM={target_temp}
                    TOOLCHANGE_STAGE_END STAGE=heat_wait
                {% endif %}
            {% endif %}
        {% else %}
            M118 热端已卸载。
        {% endif %}

        # 恢复换热端前的坐标系 (不实际移动) + 恢复加速度
        RESTORE_GCODE_STATE NAME=tool_change MOVE=0
        SET_VELOCITY_LIMIT ACCEL={saved_accel}

        # 结算换热端耗时 (累加到 print + total，并持久化)
        TOOLCHANGE_TIMER_END
        M400

    {% endif %}

    # ==========================================
    # 应用喷嘴偏移量 (支持 Z 偏移自适应)
    # ==========================================
    {% if new_tool != -1 %}
        {% set svv = printer.save_variables.variables %}

        # 读取目标热端的校准值
        {% set off_x = svv["t" ~ new_tool ~ "_offset_x"] | default(0.0) | float %}
        {% set off_y = svv["t" ~ new_tool ~ "_offset_y"] | default(0.0) | float %}
        {% set off_z = svv["t" ~ new_tool ~ "_offset_z"] | default(0.0) | float %}

        {% set adaptive = cfg.z_offset_adaptive|int %}
        {% set base_tool = printer["gcode_macro _tool_status"].base_tool|int %}

        {% if adaptive == 1 and base_tool != -1 %}
            # 自适应：Z 偏移 = 当前热端 z - 基准热端 z
            {% set base_z = svv["t" ~ base_tool ~ "_offset_z"] | default(0.0) | float %}
            {% set delta_z = off_z - base_z %}
            SET_GCODE_OFFSET X={off_x} Y={off_y} Z={delta_z} MOVE=0
            M118 T{new_tool} 加载校准值(自适应,基准T{base_tool}): X={off_x} Y={off_y} Z={off_z} (ΔZ={delta_z})
        {% else %}
            # 直接模式：使用绝对 Z 偏移
            SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
            M118 T{new_tool} 加载校准值: X={off_x} Y={off_y} Z={off_z}
        {% endif %}
    {% endif %}


#####################################################################
# 7. 重写 M109：温度收敛 (±1.5°C)，支持多热端
#   - 兼容 M109 S<temp> [T<tool>]
#   - 缺省 T 时，作用于当前激活热端
#   - 目标 ≤ 40°C 时不等待 (热床 / 关机场景)
#####################################################################
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target_temp = s if s > 0 else r %}
    {% set tool_index = params.T|default(-1)|int %}
    {% set sensor_name = printer.toolhead.extruder %}

    {% if tool_index == -1 %}
        {% set cur_tool = printer["gcode_macro _tool_status"].current_tool|int %}
        {% set tool_index = cur_tool %}
        M118 未传递tool_index参数，加热当前热端：{cur_tool}
    {% endif %}

    {% if tool_index != -1 %}
        {% if tool_index == 0 %}
            {% set sensor_name = "extruder" %}
        {% else %}
            {% set sensor_name = "extruder" ~ tool_index %}
        {% endif %}
    {% endif %}

    {% if target_temp > 40 %}
        {% if tool_index != -1 %}
            M104 S{target_temp} T{tool_index}
        {% else %}
            M104 S{target_temp}
        {% endif %}
        TEMPERATURE_WAIT SENSOR={sensor_name} MINIMUM={target_temp - 1.5} MAXIMUM={target_temp + 1.5}
    {% endif %}
