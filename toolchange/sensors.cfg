#####################################################################
# 多热端传感器配置（Phase 0）
#   - 1×工具头夹持微动开关（必装）
#   - ≤4×进料口微动开关（按需，可选）
#
# 设计准则（详见 docs/multihotend-design.md）：
#   - 进料口传感器为可选项，没装的热端自动按"已加载"处理。
#   - 夹持开关用纯查询（gcode_button），不写 press/release 副作用。
#   - 进料口传感器 pause_on_runout: False，runout 由 change_tool 宏内
#     的 EndlessSpool 决策点统一接管，避免与系统 PAUSE 冲突。
#####################################################################


#####################################################################
# 工具头夹持开关（必装）
#   ─ 注意：当前 toolhead 板上的 BOX_SENSOR(PC5) 已被 nevermore 占用，
#     请按实际接线，把下方 pin 替换为空闲引脚。
#   ─ 未配置该段时，UI 顶栏夹持指示灯灰色，宏内夹持断言会自动跳过。
#####################################################################
[gcode_button tool_clamp]
# TODO: 请按实际接线修改下面的 pin。例如 ^toolhead:PC4 / ^toolhead:PA1
pin: ^toolhead:PC4
# 不写 press_gcode / release_gcode；前端通过 state 字段轮询。


#####################################################################
# 进料口传感器（可选，按热端逐个启用）
#   未启用的热端整段删除即可——multihotend 扩展会把它视为
#   has_load_sensor=False，filament_loaded=null，UI 显示"无传感器"。
#####################################################################
[filament_switch_sensor T0_load]
switch_pin: ^multihotend:IO0
pause_on_runout: False
# runout/insert 不写脚本——状态变化由 multihotend 扩展通过订阅监听
# event_delay: 默认值即可（去抖）

[filament_switch_sensor T1_load]
switch_pin: ^multihotend:IO1
pause_on_runout: False

# T2/T3 未装传感器，整段保持注释。装上后取消注释即可：
# [filament_switch_sensor T2_load]
# switch_pin: ^multihotend:IO2
# pause_on_runout: False
#
# [filament_switch_sensor T3_load]
# switch_pin: ^multihotend:IO3
# pause_on_runout: False
