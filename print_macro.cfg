#####################################################################
# 打印流程相关宏
#   G32          - 完整归零 + Z 调平
#   PRINT_START  - 切片机调用的打印开始流程
#   PRINT_END    - 切片机调用的打印结束流程
#   _HOME_X/Y    - 归零时降低 TMC 电流，提高灵敏度
#####################################################################


#####################################################################
# G32：归零 + 三点 Z 调平 + 移动到中心抬升
#   - 清除床网，避免使用上一次未对齐的网
#   - 调平后再次 G28 以保证 Z 原点准确
#####################################################################
[gcode_macro G32]
gcode:
    _status_homing
    BED_MESH_CLEAR
    G28
    Z_TILT_ADJUST
    G28
    G0 X150 Y150 Z30 F3600


#####################################################################
# PRINT_START：切片机起始 G-code 调用
#   参数 (由切片机传入):
#     BED_TEMP        热床目标温度
#     EXTRUDER_TEMP   主热端目标温度
#     CHAMBER_TEMP    仓温目标 (Nevermore)
#     INITIAL_TOOL    起始工具号 (字符串)
#     TOOLS / TEMPS   多工具列表 (预留)
#     MESH_MIN/MAX/ALGO/PROBE_COUNT 自适应床网参数 (可选)
#
# 流程:
#   1. 设置基准工具 (Z 偏移自适应基准) + 启动仓温风扇
#   2. 加热热床 (异步)，归零后换热端 + 擦嘴
#   3. 等床温到位 → 150°C 预热热端 → 三点调平 → 床网
#   4. 加热到目标温度 → 进入打印
#####################################################################
[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(40)|float %}
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default("0")|string %}
    {% set tools_str = params.TOOLS|default("0,")|string %}
    {% set tool_list = tools_str.split(',') %}
    {% set temps_str = params.TEMPS|default("200,")|string %}
    {% set temp_list = temps_str.split(',') %}

    M117 Busy

    # 重置本次打印的换热端统计
    TOOLCHANGE_STATS_RESET_PRINT

    # 设置 Z 偏移自适应基准 + 仓温目标 + 异步加热床
    SET_BASE_TOOL T={INITIAL_TOOL}
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=nevermore TARGET={CHAMBER_TEMP}
    M140 S{BED_TEMP}

    # 归零并抬升，切到起始工具，再擦嘴
    G28
    G1 Z10 F3000
    T{INITIAL_TOOL}
    WIPE_NOZZLE_START_V2 EXTRUDER_TEMP={EXTRUDER_TEMP}
    G92 E0
    BED_MESH_CLEAR
    G90

    # 等待床温到位 (允许 -1°C 容差)
    M117 HEATING
    G1 Z10 F3000
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP - 1.0}

    # 调平前先用 150°C 软化的喷嘴避免冷喷接触床面
    M109 S150 T{INITIAL_TOOL}

    # 调平 + 网床
    G28 Z
    M117 LEVELING
    Z_TILT_ADJUST
    G28 Z
    {% if params.MESH_MIN %}
        # 自适应床网：仅扫描打印区域，速度更快
        RESPOND TYPE=command MSG="ADAPTIVE BED MESH"
        M117 ADAPTIVE BED MESH
        {action_respond_info("mesh_min={ %s } mesh_max={ %s }" % (params.MESH_MIN,params.MESH_MAX))}
        BED_MESH_CALIBRATE mesh_min={params.MESH_MIN} mesh_max={params.MESH_MAX} ALGORITHM={params.MESH_ALGO} PROBE_COUNT={params.PROBE_COUNT} ADAPTIVE=1 ADAPTIVE_MARGIN=0
    {% else %}
        # 全床扫描
        RESPOND TYPE=command MSG="BED MESH"
        M117 BED MESH
        BED_MESH_CALIBRATE
    {% endif %}

    M117 HOMING
    G28

    # 移到打印起始角落，加热到目标温度后进入打印
    G1 X40 Y25 Z10 F5000.0

    M117 HEATING
    M109 S{EXTRUDER_TEMP} T{INITIAL_TOOL}

    M117 Printing


#####################################################################
# PRINT_END：切片机结束 G-code 调用
#   - 关热床 / 回抽 / 关热端 / 释放热端 / 抬升 / 移到后部
#   - 仓温风扇降到 40°C 保温
#####################################################################
[gcode_macro PRINT_END]
gcode:
    M140 S0                         # 关热床
    M400                            # 等待运动完成
    G92 E0
    G1 E-2.0 F3600                  # 末端回抽 2mm

    TURN_OFF_HEATERS                # 关闭所有热端

    UNTOOL                          # 卸下当前热端
    SET_GCODE_OFFSET X=0 Y=0 Z=0    # 清除 G-code 偏移
    M107                            # 关模型风扇
    G91
    G1 Z2 F3000                     # 抬升 2mm
    G90
    G0 X150 Y315 F3600              # 移到床后方便取件
    BED_MESH_CLEAR
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=nevermore TARGET=40
    TOOLCHANGE_STATS_REPORT SCOPE=all
    M117 Printing completed


#####################################################################
# _HOME_X / _HOME_Y：降低电流后归零
#   - 归零时仅 60% 额定电流，避免撞限位时丢步或损坏
#   - 归零完毕后恢复打印电流
#####################################################################
[gcode_macro _HOME_X]
gcode:
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.6 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT * RUN_CURRENT_Y}

    G28 X

    # 离开限位一段距离，避免下次触发回弹
    G91
    G1 X20 F1200
    G4 P1000
    G90

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Y]
gcode:
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.6 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT * RUN_CURRENT_Y}

    G28 Y

    G91
    G1 Y-20 F1200
    G4 P1000
    G90

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}
