[include fluidd.cfg]
#####################################################################
# 主入口配置文件
#   - CoreXY 多 MCU 多热端打印机
#   - 主板 (TGL CAN6) + toolhead (CAN) + multihotend (CAN)
# 包含的子模块：
#   multitool/      多热端切换、对刀、计时
#   toolhead.cfg     toolhead CAN 板 (X 限位 / 挤出步进 / Eddy 探头)
#   print_macro.cfg  打印开始/结束宏
#   wipe_nozzle.cfg  舵机擦嘴
#   fluidd.cfg       Fluidd 默认宏 (PAUSE / RESUME / CANCEL)
#####################################################################
[include multitool/*.cfg]
[include toolhead.cfg]
[include print_macro.cfg]
[include wipe_nozzle.cfg]
[mcu]
canbus_uuid: 304432dfafdc       # TGL CAN6 主板 CAN ID

[board_pins mcu]
mcu: mcu
aliases:
    X_STEP=PC8  ,X_DIR=PC7  ,X_UART=PC6, X_DIAG=PC3,
    Y_STEP=PD2  ,Y_DIR=PC12 ,Y_UART=PB3, Y_DIAG=PC1,
    Z_STEP=PA15 ,Z_DIR=PB5  ,Z_UART=PB6,
    Z1_STEP=PA4 ,Z1_DIR=PA3 ,Z1_UART=PB1,
    Z2_STEP=PB0 ,Z2_DIR=PC5 ,Z2_UART=PC4,
    MOTOR_ENABLE=PC13,                            # 所有电机共用同一使能脚
    NOZZLE_SERVO=PC14, DOCK_FAN=PA14,
    FAN_NEVERMORE1=PC11, FAN_NEVERMORE2=PB4, FAN_TACHOMETER=PA0,
    Y_ENDSTOP=PA1, Z_ENDSTOP=PA13, CALIBRATE=PC2,
    HOT_BED=PA10, HOT_BED_TMP=PC0,
    SDA=PC9,SCL=PA8


#####################################################################
# 通用功能开关
#####################################################################
# 排除对象 (需 moonraker.conf 中 [file_manager] enable_object_processing: True)
[exclude_object]

# Klippain Shake&Tune 共振分析
[shaketune]

# 启用 FORCE_MOVE / SET_KINEMATIC_POSITION
[force_move]
enable_force_move: True


#####################################################################
# 打印机基础参数
#####################################################################
[printer]
kinematics: corexy
max_velocity: 250               # 工具头最大速度 (mm/s)
max_accel: 5200                 # 工具头最大加速度 (mm/s^2)
max_z_velocity: 12              # Z 轴最大速度 (mm/s)，12V 驱动建议 ≤15
max_z_accel: 300                # Z 轴最大加速度 (mm/s^2)
square_corner_velocity: 4.0     # 90° 转角最大瞬时速度 (mm/s)


#####################################################################
# 温度传感器
#####################################################################
[temperature_sensor 下位机]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor 上位机]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor toolhead温度]
sensor_type: temperature_mcu
sensor_mcu: toolhead
min_temp: 0
max_temp: 100

# 仓温热敏 (NTC 10K B=3420)，供 Nevermore 使用
[thermistor ntc]
temperature1: 25
resistance1: 10000
beta: 3420


#####################################################################
# 仓温风扇 Nevermore (双风扇并联，按仓温 PID 调速)
#####################################################################
[multi_pin nevermorer_fans]
pins: mcu:FAN_NEVERMORE1, mcu:FAN_NEVERMORE2

[temperature_fan nevermore]
pin: multi_pin:nevermorer_fans
tachometer_pin: ^mcu:FAN_TACHOMETER
sensor_type: ntc
sensor_pin: toolhead:BOX_SENSOR
min_temp: 0
max_temp: 70
target_temp: 40
control: pid
pid_Kp: 80.0
pid_Ki: 0.20
pid_Kd: 50.0
min_speed: 0
max_speed: 1.0
shutdown_speed: 0



#####################################################################
#   挤出机及其 TMC 配置见 multitool/multihotend.cfg
#####################################################################

#####################################################################
# X 轴
#####################################################################
[stepper_x]
step_pin: mcu:X_STEP
dir_pin: mcu:X_DIR              # 反向加 "!"
enable_pin: !mcu:MOTOR_ENABLE
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 200    # 0.9° 电机改 400
endstop_pin: ^toolhead:X_ENDSTOP
position_min: 10
position_endstop: 10
position_max: 307
homing_speed: 50
homing_retract_dist: 5
second_homing_speed: 10

[tmc2209 stepper_x]
uart_pin: mcu:X_UART
interpolate: False
run_current: 1.15                # 雷赛 42CM06 额定 2.5A，建议 ≈ 2.5*0.707*0.65
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
# Y 轴
#####################################################################
[stepper_y]
step_pin: mcu:Y_STEP
dir_pin: mcu:Y_DIR
enable_pin: !mcu:MOTOR_ENABLE
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: mcu:Y_ENDSTOP
position_endstop: 323
position_max: 323
position_min: -6
homing_speed: 50
homing_retract_dist: 5
second_homing_speed: 10

[tmc2209 stepper_y]
uart_pin: mcu:Y_UART
interpolate: False
run_current: 1.15
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
# Z 三电机 (Z / Z1 / Z2)，配合 z_tilt 三点调平
#####################################################################
[stepper_z]
step_pin: mcu:Z_STEP
dir_pin: mcu:Z_DIR
enable_pin: !mcu:MOTOR_ENABLE
microsteps: 32
rotation_distance: 2            # T8x8=8, T8x4=4, T8x2=2 (按丝杆导程)
endstop_pin: !mcu:Z_ENDSTOP
position_endstop: -0.06
position_max: 210
position_min: -5
homing_speed: 3.0
second_homing_speed: 1.0
homing_retract_dist: 1.0

[tmc2209 stepper_z]
uart_pin: mcu:Z_UART
interpolate: False
run_current: 0.8
hold_current: 0.5
stealthchop_threshold: 0

[stepper_z1]
step_pin: mcu:Z1_STEP
dir_pin: mcu:Z1_DIR
enable_pin: !mcu:MOTOR_ENABLE
microsteps: 32
rotation_distance: 2

[tmc2209 stepper_z1]
uart_pin: mcu:Z1_UART
interpolate: False
run_current: 0.8
hold_current: 0.5
stealthchop_threshold: 0

[stepper_z2]
step_pin: mcu:Z2_STEP
dir_pin: mcu:Z2_DIR
enable_pin: !mcu:MOTOR_ENABLE
microsteps: 32
rotation_distance: 2

[tmc2209 stepper_z2]
uart_pin: mcu:Z2_UART
interpolate: False
run_current: 0.8
hold_current: 0.5
stealthchop_threshold: 0


#####################################################################
# 热床
#####################################################################
[heater_bed]
heater_pin: mcu:HOT_BED
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: mcu:HOT_BED_TMP
max_power: 0.9
min_temp: 0
max_temp: 120
pwm_cycle_time: 0.277
smooth_time: 2.0

[verify_heater heater_bed]
heating_gain: 1


#####################################################################
# 模型风扇 (热端散热风扇 hotend_fan / dock_fan 见 multihotend.cfg)
#####################################################################
[fan]
pin: toolhead:MODEL_FAN
kick_start_time: 0.5
max_power: 1.0
off_below: 0.10

#####################################################################
# 空闲超时：30 分钟无操作后关电关热
#####################################################################
[idle_timeout]
gcode:
    _status_off
    TURN_OFF_HEATERS
    M84
timeout: 1800


#####################################################################
# G28 前 Z 抬升 + 中心归零
#####################################################################
[safe_z_home]
home_xy_position: 150,150       # 热床中心
z_hop: 2
move_to_previous: False


